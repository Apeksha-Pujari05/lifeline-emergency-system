<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Lifeline Emergency Response</title>
    <meta name="description" content="Login to Lifeline, your emergency response platform.">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="liquid-bg">
        <div class="blob"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card liquid-glass reveal-entry">
            <div class="auth-logo" style="margin-bottom: 32px; justify-content: center;">
                <div style="background: var(--clr-red); padding: 12px; border-radius: 12px; line-height: 1;">🚨</div>
                <h1 style="font-size: 32px; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--text-dim) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">LIFELINE</h1>
            </div>

            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Sign in to access the emergency response system</p>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input id="email" class="form-input" type="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input id="password" class="form-input" type="password" placeholder="••••••••"
                    autocomplete="current-password">
            </div>

            <div id="msg" class="msg"></div>

            <button id="loginBtn" class="btn btn-primary" onclick="login()">
                🔐 Sign In
            </button>

            <div class="auth-footer">
                Don't have an account? <a href="/signup.html">Create one</a>
            </div>

            <div class="auth-footer" style="margin-top:10px; font-size:11px; color:var(--text-muted);">
                Admin: admin@lifeline.com / admin123 &nbsp;|&nbsp; Responder: responder@lifeline.com / responder123
            </div>

        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/script.js"></script>
</body>

</html>
